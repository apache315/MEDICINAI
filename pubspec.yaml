name: mediremind
description: App AI per promemoria farmaci, pensata per anziani e caregiver.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0

  # Camera & image
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  android_alarm_manager_plus: ^4.0.4
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8

  # Permissions
  permission_handler: ^11.3.1

  # HTTP & download
  dio: ^5.7.0
  crypto: ^3.0.6

  # OCR on-device (ML Kit, no cloud, free, on-device)
  google_mlkit_text_recognition: ^0.15.0


  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Utils
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.3

  # Linting
  flutter_lints: ^5.0.0

  # Testing & mocking
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/interaction_db/
